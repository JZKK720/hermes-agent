# Hermes-Agent — Docker Compose (Ollama + PostgreSQL + OpenSpace)
#
# First-run setup:
#   mkdir -p data
#   cp docker/hermes-env.example data/.env
#   # Edit data/.env if needed, then:
#   docker compose up -d --build
#
# Services:
#   hermes-web     — Hermes web UI on :9119
#   hermes-gateway — Gateway: api_server :8789 (OpenSpace) + webhook :8644
#   postgres       — PostgreSQL :5432
#
# Both hermes services share the same ./data volume.
# Bootstrap (config copy, skills sync) is idempotent — safe to run in parallel.
#
# OpenSpace connects to hermes via: http://localhost:8789/v1  (OpenAI-compatible)
# Hermes web UI:                    http://localhost:9119
# Interactive CLI (chat):           docker exec -it hermes-web hermes  (or hermes-gateway)
#
# Ports (host → container):
#   9119 → 9119   Hermes Web UI
#   8789 → 8789   OpenSpace agent access (api_server, OpenAI-compatible)
#   8644 → 8644   Gateway webhook platform
#   5433 → 5432   PostgreSQL (host:5433 → container:5432)

x-hermes-common: &hermes-common
  build: .
  image: hermes-agent:local
  restart: unless-stopped
  volumes:
    # Runtime data (sessions, memories, skills, config) — persisted on host
    - ./data:/opt/data
    # Deployment config template — auto-copied to data/config.yaml on first start
    - ./docker/hermes-config.yaml:/opt/hermes/cli-config.yaml.example:ro
    # Mount updated entrypoint so fixes apply without a full image rebuild
    - ./docker/entrypoint.sh:/opt/hermes/docker/entrypoint.sh:ro
  environment:
    # UID remapping — must match your host user to avoid permission issues
    - HERMES_UID=1000
    # Ollama does not require a real API key; any non-empty string satisfies the field
    - OPENAI_API_KEY=ollama
    # Postgres DSN — available to memory plugins and skills
    - DATABASE_URL=postgresql://hermes:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hermes
  env_file:
    # User secrets — copy docker/hermes-env.example → data/.env and fill in
    - path: ./data/.env
      required: false
  extra_hosts:
    # On Linux Docker, resolves host.docker.internal → host network
    - "host.docker.internal:host-gateway"
  depends_on:
    postgres:
      condition: service_healthy

services:

  hermes-web:
    <<: *hermes-common
    container_name: hermes-web
    # entrypoint.sh receives "dashboard" → runs: hermes dashboard --host 0.0.0.0 --port 9119 --no-open
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open"]
    ports:
      - "9119:9119"
    healthcheck:
          test: ["CMD", "python3", "-c", "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:9119/api/status'); sys.exit(0 if r.status==200 else 1)"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 60s
  hermes-gateway:
    <<: *hermes-common
    container_name: hermes-gateway
    # entrypoint.sh receives "gateway" → runs: hermes gateway
    # api_server platform binds :8789 per docker/hermes-config.yaml
    command: ["gateway"]
    ports:
      - "8789:8789"     # OpenSpace agent access  (/v1 OpenAI-compatible)
      - "8644:8644"     # Webhook platform
    environment:
      - HERMES_UID=1000
      - OPENAI_API_KEY=ollama
      - DATABASE_URL=postgresql://hermes:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hermes
      # Allow OpenSpace runtime (port 8788) to call the agent API
      - API_SERVER_CORS_ORIGINS=http://localhost:8788,http://host.docker.internal:8788
      # Required when binding api_server to 0.0.0.0 — used as Bearer token by OpenSpace
      - API_SERVER_KEY=${API_SERVER_KEY:-28765d337208aa3c0b6671cb1969e8cad9c22d7b7967b216}
      # Allow all incoming users on the gateway (no per-user allowlist needed for OpenSpace)
      - GATEWAY_ALLOW_ALL_USERS=true
    # Wait for hermes-web's healthcheck so config bootstrap is complete before gateway reads it
    depends_on:
      postgres:
        condition: service_healthy
      hermes-web:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hermes
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
